spring:
  application:
    name: wsdl-client-generator
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  thymeleaf:
    cache: false

server:
  port: 8080
  servlet:
    context-path: /soap-client-generator

app:
  temp-dir: ${java.io.tmpdir}/wsdl-generator
  maven-executable: "mvn"
  url-input-enabled: false   # true → URL sekmesi aktif, false → Yakında (devre dışı)
  job-ttl-minutes: 60
  async:
    core-pool-size: 4
    max-pool-size: 10
    queue-capacity: 50
