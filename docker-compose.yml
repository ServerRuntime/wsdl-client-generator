services:
  soap-client-generator:
    build: .
    image: soap-client-generator:latest
    container_name: soap-client-generator
    ports:
      - "8085:8080"
    restart: unless-stopped
    environment:
      - TZ=Europe/Istanbul
      - APP_TEMP_DIR=/tmp/wsdl-generator
      - APP_MAVEN_EXECUTABLE=mvn
      - APP_JOB_TTL_MINUTES=60
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/soap-client-generator/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - proxy-network

networks:
  proxy-network:
    external: true
